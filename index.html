<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>GIOIA — Prospecção</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f3;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #fff;
      border-bottom: 1px solid #e8e8e5;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .logo { font-size: 15px; font-weight: 600; color: #1a1a1a; letter-spacing: -0.3px; }
    .logo span { color: #1D9E75; }
    .updated { font-size: 12px; color: #888; }

    .refresh-btn {
      background: none;
      border: 1px solid #e0e0dc;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      color: #555;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
    }
    .refresh-btn:hover { background: #f5f5f3; }
    .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

    main { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

    .metrics {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-bottom: 1.5rem;
    }

    .metric {
      background: #fff;
      border-radius: 12px;
      padding: 1.25rem;
      border: 1px solid #e8e8e5;
    }
    .metric-val { font-size: 32px; font-weight: 600; line-height: 1; margin-bottom: 6px; }
    .metric-label { font-size: 12px; color: #888; }
    .metric-val.green { color: #1D9E75; }
    .metric-val.red { color: #D85A30; }
    .metric-val.amber { color: #BA7517; }
    .metric-val.blue { color: #185FA5; }

    .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; margin-bottom: 1.5rem; }

    .card {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #e8e8e5;
      padding: 1.5rem;
    }
    .card-title {
      font-size: 13px;
      font-weight: 600;
      color: #1a1a1a;
      margin-bottom: 1.25rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .card-title .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #1D9E75;
      display: inline-block;
    }

    /* Funil */
    .funnel-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .funnel-label { font-size: 12px; color: #666; width: 155px; flex-shrink: 0; text-align: right; }
    .funnel-bar-bg { flex: 1; height: 22px; background: #f0f0ec; border-radius: 4px; overflow: hidden; }
    .funnel-bar { height: 100%; background: #9FE1CB; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; min-width: 28px; transition: width 0.5s ease; }
    .funnel-num { font-size: 11px; font-weight: 600; color: #085041; }

    /* Tabela de parados */
    .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 1rem; font-size: 12px; color: #666; }
    .filter-row select {
      font-size: 12px;
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #e0e0dc;
      background: #fff;
      color: #1a1a1a;
      cursor: pointer;
    }

    .stale-table { width: 100%; border-collapse: collapse; font-size: 12px; }
    .stale-table th {
      text-align: left;
      font-weight: 500;
      color: #888;
      padding: 0 8px 10px 0;
      border-bottom: 1px solid #f0f0ec;
    }
    .stale-table td {
      padding: 9px 8px 9px 0;
      border-bottom: 1px solid #f8f8f6;
      vertical-align: middle;
    }
    .stale-table tr:last-child td { border-bottom: none; }
    .deal-name { font-weight: 500; color: #1a1a1a; }

    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 500;
      white-space: nowrap;
    }
    .badge-stage { background: #f0f0ec; color: #666; }
    .badge-hot { background: #FCEBEB; color: #A32D2D; }
    .badge-warm { background: #FAEEDA; color: #854F0B; }
    .badge-ok { background: #E1F5EE; color: #0F6E56; }

    .empty { color: #aaa; font-size: 13px; padding: 1.5rem 0; text-align: center; }
    .error-msg { color: #D85A30; font-size: 13px; padding: 1rem; background: #FAECE7; border-radius: 8px; }

    .more-label { font-size: 11px; color: #aaa; margin-top: 8px; }

    @media (max-width: 700px) {
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .grid-2 { grid-template-columns: 1fr; }
      .funnel-label { width: 110px; font-size: 11px; }
      header { padding: 0.75rem 1rem; }
      main { padding: 1rem; }
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">GIOIA <span>Prospecção</span></div>
    <div class="updated" id="updated">—</div>
  </div>
  <button class="refresh-btn" id="refresh-btn" onclick="loadData()">
    ↻ Atualizar
  </button>
</header>

<main>
  <div class="metrics" id="metrics">
    <div class="metric"><div class="metric-val">—</div><div class="metric-label">Em aberto</div></div>
    <div class="metric"><div class="metric-val green">—</div><div class="metric-label">Fechados</div></div>
    <div class="metric"><div class="metric-val red">—</div><div class="metric-label">Perdidos</div></div>
    <div class="metric"><div class="metric-val amber">—</div><div class="metric-label">Parados +7d</div></div>
  </div>

  <div class="grid-2">
    <div class="card">
      <div class="card-title"><span class="dot"></span> Negócios por etapa</div>
      <div id="funnel"><div class="empty">Carregando...</div></div>
    </div>

    <div class="card">
      <div class="card-title"><span class="dot" style="background:#185FA5"></span> Distribuição do funil</div>
      <div style="position:relative; height:260px;">
        <canvas id="pie-chart" role="img" aria-label="Gráfico de distribuição por etapa"></canvas>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="card-title"><span class="dot" style="background:#D85A30"></span> Leads parados sem atividade</div>
    <div class="filter-row">
      Mostrar parados há mais de
      <select id="idle-days" onchange="renderStale()">
        <option value="3">3 dias</option>
        <option value="7" selected>7 dias</option>
        <option value="14">14 dias</option>
        <option value="30">30 dias</option>
      </select>
    </div>
    <div id="stale-content"><div class="empty">Carregando...</div></div>
  </div>
</main>

<script>
const STAGE_ORDER = [
  'Base de clientes','1° Contato','2° Contato','3° Contato','4° Contato',
  'Vale a pena retornar','Descobri o Decisor','Contato com Decisor',
  'Reunião agendada','Reunião realizada','Negociação'
];

let allDeals = [], wonTotal = 0, lostTotal = 0, openTotal = 0;
let pieChart = null;

async function loadData() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  btn.textContent = '↻ Atualizando...';

  try {
    const res = await fetch('/api/deals');
    if (!res.ok) throw new Error(`Erro ${res.status}`);
    const data = await res.json();

    allDeals = data.deals || [];
    wonTotal = data.won_total || 0;
    lostTotal = data.lost_total || 0;
    openTotal = data.open_total || allDeals.length;

    renderMetrics();
    renderFunnel();
    renderPie();
    renderStale();

    const now = new Date();
    document.getElementById('updated').textContent =
      'Atualizado às ' + now.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });

  } catch(e) {
    document.getElementById('stale-content').innerHTML =
      `<div class="error-msg">Erro ao carregar dados: ${e.message}</div>`;
  }

  btn.classList.remove('loading');
  btn.textContent = '↻ Atualizar';
}

function renderMetrics() {
  const now = new Date();
  const stale7 = allDeals.filter(d => {
    if (!d.last_activity_at) return true;
    return Math.floor((now - new Date(d.last_activity_at)) / 86400000) >= 7;
  }).length;

  const total = openTotal + wonTotal + lostTotal;
  const conv = total > 0 ? Math.round((wonTotal / total) * 100) : 0;

  document.getElementById('metrics').innerHTML = `
    <div class="metric">
      <div class="metric-val blue">${openTotal}</div>
      <div class="metric-label">Em aberto</div>
    </div>
    <div class="metric">
      <div class="metric-val green">${wonTotal}</div>
      <div class="metric-label">Fechados &mdash; ${conv}% conversão</div>
    </div>
    <div class="metric">
      <div class="metric-val red">${lostTotal}</div>
      <div class="metric-label">Perdidos</div>
    </div>
    <div class="metric">
      <div class="metric-val amber">${stale7}</div>
      <div class="metric-label">Parados +7 dias</div>
    </div>
  `;
}

function getStageData() {
  const byStage = {};
  allDeals.forEach(d => { byStage[d.stage] = (byStage[d.stage] || 0) + 1; });
  return STAGE_ORDER
    .map(s => ({ stage: s, count: byStage[s] || 0 }))
    .filter(s => s.count > 0);
}

function renderFunnel() {
  const stages = getStageData();
  const max = Math.max(...stages.map(s => s.count), 1);

  document.getElementById('funnel').innerHTML = stages.map(s => {
    const pct = Math.round((s.count / max) * 100);
    return `
      <div class="funnel-row">
        <div class="funnel-label">${s.stage}</div>
        <div class="funnel-bar-bg">
          <div class="funnel-bar" style="width:${pct}%">
            <span class="funnel-num">${s.count}</span>
          </div>
        </div>
      </div>`;
  }).join('');
}

function renderPie() {
  const stages = getStageData();
  const colors = ['#9FE1CB','#5DCAA5','#1D9E75','#0F6E56','#085041',
                  '#B5D4F4','#378ADD','#185FA5','#FAC775','#BA7517','#D85A30'];

  if (pieChart) pieChart.destroy();
  const ctx = document.getElementById('pie-chart').getContext('2d');
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: {
      labels: stages.map(s => s.stage),
      datasets: [{
        data: stages.map(s => s.count),
        backgroundColor: colors.slice(0, stages.length),
        borderWidth: 2,
        borderColor: '#fff',
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: (ctx) => ` ${ctx.label}: ${ctx.raw} negócios`
          }
        }
      }
    }
  });
}

function renderStale() {
  const minDays = parseInt(document.getElementById('idle-days').value);
  const now = new Date();

  const stale = allDeals
    .map(d => ({
      ...d,
      days: d.last_activity_at
        ? Math.floor((now - new Date(d.last_activity_at)) / 86400000)
        : 9999
    }))
    .filter(d => d.days >= minDays)
    .sort((a, b) => b.days - a.days);

  if (!stale.length) {
    document.getElementById('stale-content').innerHTML =
      `<div class="empty">Nenhum lead parado há mais de ${minDays} dias 🎉</div>`;
    return;
  }

  const rows = stale.slice(0, 20).map(d => {
    const daysLabel = d.days === 9999 ? 'Sem atividade' : `${d.days}d`;
    const badgeClass = d.days > 30 ? 'badge-hot' : d.days > 7 ? 'badge-warm' : 'badge-ok';
    const lastAct = d.last_activity_at
      ? new Date(d.last_activity_at).toLocaleDateString('pt-BR')
      : '—';
    return `
      <tr>
        <td><span class="deal-name">${d.name}</span></td>
        <td><span class="badge badge-stage">${d.stage}</span></td>
        <td><span class="badge ${badgeClass}">${daysLabel}</span></td>
        <td style="color:#888">${lastAct}</td>
        <td style="color:#888">${d.user}</td>
      </tr>`;
  }).join('');

  document.getElementById('stale-content').innerHTML = `
    <table class="stale-table">
      <thead><tr>
        <th>Negócio</th><th>Etapa</th><th>Parado há</th><th>Última atividade</th><th>Responsável</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    ${stale.length > 20 ? `<div class="more-label">+${stale.length - 20} outros leads parados</div>` : ''}
  `;
}

loadData();
</script>
</body>
</html>
